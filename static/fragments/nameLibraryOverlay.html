<!-- Create Library Dialog (name + location, SS3) -->
<div class="picker-overlay" id="nameLibraryOverlay" style="display: none">
  <div class="import-card create-library-card">
    <!-- Header -->
    <div class="import-header">
      <span class="import-title">Create new library</span>
      <button
        class="import-close-btn"
        id="nameLibraryCloseBtn"
        aria-label="Close"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Content -->
    <div class="import-progress-section create-library-body">
      <div class="create-library-form">
        <div class="import-status-text">
          <p style="margin: 0; color: var(--text-secondary); font-size: 14px">
            Your new library needs its own folder. Please give it a name.
          </p>
        </div>

        <!-- Name input -->
        <div class="create-library-name-field">
          <input
            type="text"
            id="libraryNameInput"
            placeholder="Photo Library"
            value="Photo Library"
            class="create-library-name-input"
            autocomplete="off"
            spellcheck="false"
          />
          <div id="libraryNameError" class="create-library-name-error"></div>
        </div>

        <!-- Compact location row -->
        <button
          type="button"
          id="libraryLocationCompact"
          class="library-location-compact"
          aria-label="Change library location"
        >
          <span class="library-location-compact-path" id="libraryLocationCompactPath"></span>
          <span class="material-symbols-outlined library-location-compact-icon"
            >chevron_right</span
          >
        </button>
      </div>

      <!-- Expanded folder picker -->
      <div id="libraryLocationExpanded" class="create-library-picker-panel" hidden>
        <div class="breadcrumb" id="createLibraryBreadcrumb"></div>
        <div class="folder-list" id="createLibraryFolderList"></div>
        <div class="selected-path create-library-selected">
          <p>Selected:</p>
          <p id="createLibrarySelectedPath">No path selected</p>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="import-actions">
      <button class="btn btn-secondary" id="nameLibraryCancelBtn" type="button">
        Cancel
      </button>
      <button
        class="btn btn-secondary"
        id="nameLibraryGoBackBtn"
        type="button"
        style="display: none"
      >
        Go back
      </button>
      <button class="btn btn-primary" id="nameLibraryConfirmBtn" type="button">
        Continue
      </button>
    </div>
  </div>
</div>
