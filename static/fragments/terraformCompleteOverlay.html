<!-- Terraform Complete Overlay -->
<div class="import-overlay" id="terraformCompleteOverlay" style="display: none">
  <div class="import-card">
    <div class="import-header">
      <span class="import-title">Convert to library</span>
      <button
        class="import-close-btn"
        id="terraformCompleteCloseBtn"
        aria-label="Close"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="import-progress-section">
      <div class="import-status-text" id="terraformCompleteStatusText"></div>
      <div class="import-stats" id="terraformCompleteStats">
        <span class="import-stat">
          <span class="import-stat-label">Processed:</span>
          <span class="import-stat-value" id="terraformCompleteProcessed"
            >0</span
          >
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Duplicates:</span>
          <span class="import-stat-value" id="terraformCompleteDuplicates"
            >0</span
          >
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Skipped:</span>
          <span class="import-stat-value" id="terraformCompleteSkipped">0</span>
        </span>
      </div>
    </div>
    <div
      class="import-details-section"
      id="terraformCompleteDetailsSection"
      style="display: none"
    >
      <button class="import-details-toggle" id="terraformCompleteDetailsToggle">
        <span class="material-symbols-outlined">expand_more</span>
        <span>Show details</span>
      </button>
      <pre
        class="clean-library-log-feed"
        id="terraformCompleteLogFeed"
        style="display: none"
        aria-live="polite"
      ></pre>
    </div>
    <div class="import-actions">
      <button class="btn btn-primary" id="terraformCompleteDoneBtn">
        Done
      </button>
    </div>
  </div>
</div>
