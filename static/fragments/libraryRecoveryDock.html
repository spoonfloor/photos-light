<div class="library-recovery-dock" id="libraryRecoveryDock" style="display: none">
  <div class="import-card library-recovery-card">
    <div class="import-header">
      <span class="import-title" id="libraryRecoveryTitle">Scanning library</span>
      <button
        type="button"
        class="import-close-btn"
        id="libraryRecoveryCloseBtn"
        aria-label="Close"
        style="display: none"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="import-progress-section">
      <div class="import-status-text" id="libraryRecoveryBody">
        Reviewing the database and searching for available media
      </div>

      <div
        class="library-recovery-status"
        id="libraryRecoveryStatus"
        style="display: none"
      ></div>

      <div
        class="library-recovery-error"
        id="libraryRecoveryError"
        style="display: none"
      ></div>

      <div class="import-stats" id="libraryRecoveryStats" style="display: none"></div>
    </div>

    <div
      class="import-actions"
      id="libraryRecoveryActions"
      style="display: none"
    ></div>
  </div>
</div>
