<!-- Terraform Preview Overlay -->
<div class="import-overlay" id="terraformPreviewOverlay" style="display: none">
  <div class="import-card">
    <div class="import-header">
      <span class="import-title">Convert to library</span>
      <button
        class="import-close-btn"
        id="terraformPreviewCloseBtn"
        aria-label="Close"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="import-progress-section">
      <div id="terraformPreviewScanningSection" style="display: none">
        <div class="import-status-text" id="terraformPreviewScanStatus"></div>
        <div class="import-stats" id="terraformPreviewPreflightStats">
          <span class="import-stat">
            <span class="import-stat-label">Photos:</span>
            <span
              class="import-stat-value"
              id="terraformPreviewPreflightPhotos"
              >0</span
            >
          </span>
          <span class="import-stat">
            <span class="import-stat-label">Videos:</span>
            <span
              class="import-stat-value"
              id="terraformPreviewPreflightVideos"
              >0</span
            >
          </span>
          <span class="import-stat">
            <span class="import-stat-label">Total:</span>
            <span
              class="import-stat-value"
              id="terraformPreviewPreflightTotal"
              >0</span
            >
          </span>
        </div>
      </div>

      <div id="terraformPreviewConfirmSection">
        <p class="import-explainer" id="terraformPreviewExplainer">
          Is this the correct folder?
        </p>
        <p id="terraformPreviewPath" class="terraform-preview-path">
          /path/to/folder/
        </p>
        <div class="import-stats" id="terraformPreviewConfirmStats">
          <span class="import-stat">
            <span class="import-stat-label">Photos:</span>
            <span class="import-stat-value" id="terraformPreviewPhotos">0</span>
          </span>
          <span class="import-stat">
            <span class="import-stat-label">Videos:</span>
            <span class="import-stat-value" id="terraformPreviewVideos">0</span>
          </span>
          <span class="import-stat">
            <span class="import-stat-label">Total:</span>
            <span class="import-stat-value" id="terraformPreviewTotal">0</span>
          </span>
        </div>
      </div>
    </div>
    <div class="import-actions" id="terraformPreviewActions">
      <button class="btn btn-secondary" id="terraformPreviewCancelBtn">
        Cancel
      </button>
      <button class="btn btn-secondary" id="terraformPreviewGoBackBtn">
        Go back
      </button>
      <button
        class="btn btn-primary"
        id="terraformPreviewContinueBtn"
        disabled
      >
        Continue
      </button>
    </div>
  </div>
</div>
