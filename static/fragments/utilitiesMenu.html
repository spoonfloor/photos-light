<!-- Utilities Dropdown Menu — Rebuild thumbnails removed from UI Apr 2026 (capability kept: API + JS below). -->
<div class="utilities-menu" id="utilitiesMenu" style="display: none">
  <button class="utilities-menu-item" id="clearStarsBtn">
    <span class="utilities-menu-icon-composite" aria-hidden="true">
      <span class="material-symbols-outlined">hide_source</span>
      <span class="material-symbols-outlined filled">star</span>
    </span>
    <span>Clear stars</span>
  </button>

  <button class="utilities-menu-item" id="downloadSelectedBtn">
    <span class="material-symbols-outlined">download</span>
    <span>Download</span>
  </button>

  <div class="utilities-menu-divider"></div>

  <button class="utilities-menu-item" id="switchLibraryBtn">
    <span class="material-symbols-outlined">folder_open</span>
    <span>Open library</span>
  </button>

  <button class="utilities-menu-item" id="convertToLibraryBtn">
    <span class="material-symbols-outlined">bookmark_manager</span>
    <span>Convert to library</span>
  </button>

  <button class="utilities-menu-item" id="closeLibraryBtn">
    <span class="material-symbols-outlined">logout</span>
    <span>Close library</span>
  </button>

  <button class="utilities-menu-item" id="cleanOrganizeBtn">
    <span class="material-symbols-outlined">auto_fix_high</span>
    <span>Clean library</span>
  </button>

  <div class="utilities-menu-divider" id="trashMenuDivider" hidden></div>

  <button class="utilities-menu-item" id="viewTrashBtn">
    <span class="material-symbols-outlined">delete</span>
    <span>Open trash</span>
  </button>

  <button class="utilities-menu-item" id="restoreAllTrashBtn" hidden>
    <span class="material-symbols-outlined">undo</span>
    <span>Restore all</span>
  </button>

  <button class="utilities-menu-item" id="emptyTrashBtn" hidden>
    <span class="material-symbols-outlined">delete_forever</span>
    <span>Empty trash</span>
  </button>
</div>
