<!-- Library Transition Overlay -->
<div class="import-overlay" id="libraryTransitionOverlay" style="display: none">
  <div class="import-card">
    <div class="import-header">
      <span class="import-title" id="libraryTransitionTitle">Opening library</span>
    </div>

    <div class="import-progress-section">
      <div class="import-status-text">
        <span id="libraryTransitionStatusLabel">Loading your media.</span>
        <span class="import-spinner" aria-hidden="true"></span>
      </div>
      <div
        class="library-transition-path"
        id="libraryTransitionPath"
        style="display: none"
      ></div>
    </div>

    <div
      class="import-actions"
      id="libraryTransitionActions"
      style="display: none"
    >
      <button class="btn btn-secondary" id="libraryTransitionCancelBtn" type="button">
        Cancel
      </button>
    </div>
  </div>
</div>
