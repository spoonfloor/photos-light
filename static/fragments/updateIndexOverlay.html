<!-- Clean Library Overlay -->
<div class="import-overlay" id="updateIndexOverlay">
  <div class="import-card">
    <!-- Header -->
    <div class="import-header">
      <span class="import-title">Clean library</span>
      <button
        class="import-close-btn"
        id="updateIndexCloseBtn"
        aria-label="Close"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Progress Section -->
    <div class="import-progress-section">
      <p class="import-explainer" id="updateIndexExplainer" style="display: none">
        This will organize your library, remove duplicates and corrupted media, and
        fix any database issues.
      </p>

      <div class="import-status-text" id="updateIndexStatusText"></div>

      <div
        class="import-secondary-status"
        id="updateIndexSecondaryStatus"
        style="display: none"
      ></div>

      <div class="import-stats" id="updateIndexPreflightStats" style="display: none">
        <span class="import-stat">
          <span class="import-stat-label">Photos:</span>
          <span class="import-stat-value" id="updateIndexPhotoCount">0</span>
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Videos:</span>
          <span class="import-stat-value" id="updateIndexVideoCount">0</span>
        </span>
      </div>

      <div class="import-stats" id="updateIndexStats" style="display: none">
        <span class="import-stat">
          <span class="import-stat-label">Misfiled Media:</span>
          <span class="import-stat-value" id="misfiledMediaCount">0</span>
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Duplicates:</span>
          <span class="import-stat-value" id="duplicatesCount">0</span>
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Unsupported Files:</span>
          <span class="import-stat-value" id="unsupportedFilesCount">0</span>
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Metadata Cleanup:</span>
          <span class="import-stat-value" id="metadataCleanupCount">0</span>
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Database Repairs:</span>
          <span class="import-stat-value" id="databaseRepairsCount">0</span>
        </span>
      </div>
    </div>

    <!-- Details Section (Phase 4 only) -->
    <div
      class="import-details-section"
      id="updateIndexDetailsSection"
      style="display: none"
    >
      <button class="import-details-toggle" id="updateIndexDetailsToggle">
        <span class="material-symbols-outlined">expand_more</span>
        <span>Show details</span>
      </button>

      <pre
        class="clean-library-log-feed"
        id="updateIndexLogFeed"
        style="display: none"
        aria-live="polite"
      ></pre>

      <div
        class="import-details-list"
        id="updateIndexDetailsList"
        style="display: none"
      >
        <!-- Populated dynamically -->
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="import-actions">
      <button class="btn btn-secondary" id="updateIndexCancelBtn">
        Cancel
      </button>
      <button
        class="btn btn-secondary"
        id="updateIndexStartOverBtn"
        style="display: none"
      >
        Start over
      </button>
      <button
        class="btn btn-primary"
        id="updateIndexProceedBtn"
        style="display: none"
      >
        Continue
      </button>
      <button
        class="btn btn-primary"
        id="updateIndexDoneBtn"
        style="display: none"
      >
        Done
      </button>
    </div>
  </div>
</div>
