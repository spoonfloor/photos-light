<div class="import-overlay" id="debugFileCountOverlay" style="display: none">
  <div class="import-card">
    <div class="import-header">
      <span class="import-title" id="debugFileCountTitle">Debug file count</span>
      <button
        class="import-close-btn"
        id="debugFileCountCloseBtn"
        aria-label="Close"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="import-progress-section">
      <div class="import-status-text" id="debugFileCountStatusText">
        Counting files
      </div>

      <div class="import-stats" id="debugFileCountStats" style="display: none"></div>
      <div
        class="import-status-text"
        id="debugFileCountCanonicalLine"
        style="display: none; font-size: 12px; color: var(--text-secondary); margin-top: 10px; line-height: 1.4"
      ></div>
    </div>

    <div class="import-actions">
      <button class="btn btn-secondary" id="debugFileCountCancelBtn">
        Cancel
      </button>
      <button
        class="btn btn-primary"
        id="debugFileCountProceedBtn"
        style="display: none"
      >
        Proceed
      </button>
    </div>
  </div>
</div>
