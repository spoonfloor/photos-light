<!-- Import Overlay (Google Photos style) -->
<div class="import-overlay" id="importOverlay">
  <div class="import-card">
    <!-- Header -->
    <div class="import-header">
      <span class="import-title">Add photos</span>
      <button class="import-close-btn" id="importCloseBtn" aria-label="Close">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Progress Section -->
    <div class="import-progress-section">
      <p class="import-explainer" id="importExplainer" style="display: none"></p>

      <div class="import-status-text" id="importStatusText">
        Preparing import
      </div>

      <div
        class="import-secondary-status"
        id="importSecondaryStatus"
        style="display: none"
      ></div>

      <div class="import-stats" id="importPreflightStats" style="display: none">
        <span class="import-stat">
          <span class="import-stat-label">Photos:</span>
          <span class="import-stat-value" id="importPhotoCount">0</span>
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Videos:</span>
          <span class="import-stat-value" id="importVideoCount">0</span>
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Total:</span>
          <span class="import-stat-value" id="importTotalCount">0</span>
        </span>
      </div>

      <div class="import-stats" id="importStats" style="display: none">
        <span class="import-stat">
          <span class="import-stat-label">Added:</span>
          <span class="import-stat-value" id="importedCount">0</span>
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Duplicates:</span>
          <span class="import-stat-value" id="duplicateCount">0</span>
        </span>
        <span class="import-stat">
          <span class="import-stat-label">Skipped:</span>
          <span class="import-stat-value" id="errorCount">0</span>
        </span>
      </div>
    </div>

    <!-- Details Section (expandable) -->
    <div
      class="import-details-section"
      id="importDetailsSection"
      style="display: none"
    >
      <button class="import-details-toggle" id="importDetailsToggle">
        <span class="material-symbols-outlined">expand_more</span>
        <span>Show details</span>
      </button>

      <pre
        class="clean-library-log-feed"
        id="importLogFeed"
        style="display: none"
        aria-live="polite"
      ></pre>

      <div
        class="import-details-list"
        id="importDetailsList"
        style="display: none"
      >
        <!-- Populated dynamically -->
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="import-actions">
      <button
        class="btn btn-secondary"
        id="importCancelBtn"
        style="display: none"
      >
        Cancel
      </button>
      <button
        class="btn btn-primary"
        id="importContinueBtn"
        style="display: none"
      >
        Continue
      </button>
      <button
        class="btn btn-secondary"
        id="importUndoBtn"
        style="display: none"
      >
        Undo import
      </button>
      <button class="btn btn-primary" id="importDoneBtn" style="display: none">
        Done
      </button>
    </div>
  </div>
</div>
