<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos Light</title>

    <!-- Favicon: injected so Chrome drops cached icon links on version bump -->
    <script>
      (function () {
        var v = '2';
        document.querySelectorAll('link[rel*="icon"]').forEach(function (node) {
          node.remove();
        });
        var link = document.createElement('link');
        link.rel = 'icon';
        link.type = 'image/png';
        link.sizes = '32x32';
        link.href = 'assets/favicon.png?v=' + encodeURIComponent(v);
        document.head.appendChild(link);
      })();
    </script>

    <!-- Material Symbols Outlined (self-hosted) -->
    <link rel="stylesheet" href="css/material-symbols.css?v=1" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css?v=41" />
  </head>
  <body>
  <!-- App chrome: app bar + filter chips stacked below it -->
    <div id="appChromeMount">
      <div id="appBarMount"></div>

      <div id="trashChromeMount" class="trash-chrome-bar" hidden>
        <button
          type="button"
          class="trash-chrome-back"
          id="trashBackBtn"
          aria-label="Back to library"
        >
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <span class="trash-chrome-title">Trash</span>
      </div>

      <div id="filterChipRailMount" class="filter-chip-rail" hidden>
        <div class="filter-chip-rail-scroll">
          <button
            type="button"
            class="filter-chip"
            data-filter="recentImports"
            aria-pressed="false"
          >
            recent imports
          </button>
          <button
            type="button"
            class="filter-chip"
            data-filter="starred"
            aria-pressed="false"
          >
            starred
          </button>
          <button
            type="button"
            class="filter-chip"
            data-filter="video"
            aria-pressed="false"
          >
            video
          </button>
        </div>
      </div>
    </div>

    <!-- Main Content (will be grid later) -->
    <div class="page-main">
      <div class="page-wrapper">
        <div id="photoContainer">
          <!-- Grid will be rendered here by JavaScript -->
        </div>
      </div>
    </div>

    <!-- Lightbox Mount Point -->
    <div id="lightboxMount"></div>

    <!-- Date Editor Mount Point -->
    <div id="dateEditorMount"></div>

    <!-- Import Overlay Mount Point -->
    <div id="importOverlayMount"></div>

    <!-- Dialog Mount Point -->
    <div id="dialogMount"></div>

    <!-- Toast Mount Point -->
    <div id="toastMount"></div>

    <!-- JavaScript -->
    <script src="js/pickerUtils.js?v=4"></script>
    <script src="js/pickerFilesystem.js?v=1"></script>
    <script src="js/folderPicker.js?v=17"></script>
    <script src="js/photoPicker.js?v=7"></script>
    <script src="js/libraryRecoveryUI.js?v=1"></script>
    <script src="js/gridLayout.js?v=16"></script>
    <script src="js/gridScrollAnchor.js?v=12"></script>
    <script src="js/thumbnailQueue.js?v=5"></script>
    <script src="js/virtualGrid.js?v=47"></script>
    <script src="js/gridScrollTargetRecipe.js?v=9"></script>
    <script src="js/libraryMutation.js?v=3"></script>
    <script src="js/trashView.js?v=10"></script>
    <script src="js/lightboxVideoControls.js?v=1"></script>
    <script src="js/flowController.js?v=6"></script>
    <script src="js/main.js?v=469"></script>
  </body>
</html>
